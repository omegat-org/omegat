name: Pull request
description: Submit a pull request for code review
title: ""
labels: []
body:
  - type: markdown
    id: pull-request-general-summary
    attributes:
      value: |
        Please provide a general summary of your changes in the pull request title.

        **Note:** The OmegaT project uses GitHub pull requests for code review only.
        The "real" code base is hosted on SourceForge; the GitHub project is a mirror.

        If your PR is accepted it will be applied to the SourceForge repository by a
        core contributor and the PR ticket will be closed. It will appear to have been
        "closed without merging" but that is normal.
    validations:
      required: true

  - type: dropdown
    id: pull-request-type
    attributes:
      label: Pull request type
      description: |
        Please select the type of change your PR introduces. 
        **Guide:** Apply the corresponding GitHub label if you have permissions:
        - Bug fix -> `bug`
        - Feature enhancement -> `enhancement`
        - Documentation -> `documentation`
        - Build/Release -> `build/release`
        - CI/CD -> `github_actions`
        - Dependency updates -> `dependencies`
        - Refactoring -> `refactoring`
        - Localization/Translation -> `L10N/Translation`
        - UI/UX -> `UI`
      options:
        - Bug fix
        - Feature enhancement
        - Documentation
        - Build and release changes
        - CI/CD changes
        - Dependency updates
        - Refactoring
        - Localization/Translation
        - UI/UX changes
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### PR Title Guide
        Please use a descriptive title for your PR. If it resolves a SourceForge ticket, include the ticket number:
        - `[#123] Fix crash when opening project`
        - `[#456] Add support for new file format`
        - `Update README with contribution guidelines`

  - type: input
    id: other-pull-request-type
    attributes:
      label: Other pull request type
      description: If you selected "Other", describe the type of change here.
      placeholder: "Example: cleanup, refactoring, localization, infrastructure"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Which ticket is resolved?

        Please refer to a relevant SourceForge ticket. The ticket information is used for the changelog.

  - type: dropdown
    id: ticket-type
    attributes:
      label: Ticket type
      description: Select the type of SourceForge ticket.
      options:
        - bugs
        - feature-requests
        - documentation
    validations:
      required: false

  - type: input
    id: ticket-number
    attributes:
      label: Ticket number
      description: Enter the SourceForge ticket number.
      placeholder: "Example: 123"
    validations:
      required: false

  - type: input
    id: ticket-title
    attributes:
      label: Ticket title
      description: Paste the resolved ticket title.
      placeholder: "Example: Fix crash when opening project"
    validations:
      required: false

  - type: textarea
    id: changes
    attributes:
      label: What does this PR change?
      description: List the main changes introduced by this pull request.
      placeholder: |
        - 
        - 
        -
    validations:
      required: true

  - type: textarea
    id: other-information
    attributes:
      label: Other information
      description: Add any other information that is important to this PR, such as before-and-after screenshots.
      placeholder: |
        Screenshots, notes for reviewers, compatibility notes, migration notes, or other relevant information.
    validations:
      required: false