import java.nio.file.Paths

ext.makeLinuxTask = { args ->
    def distTaskName = "install${args.name.capitalize()}Dist"
    def tarTaskName = "${args.name}DistTarBz"
    def parentTask = tasks.getByName(args.parentTaskName)
    def fullVersion = project.ext.omtVersion.version + project.ext.omtVersion.beta

    tasks.register(distTaskName, Sync) {
        group = 'distribution'
        description = "Creates a linux installDist for ${args.name}."
        with distributions.main.contents
        destinationDir = file(layout.buildDirectory.file("install/${application.applicationName}-${args.suffix}"))
        onlyIf {
            condition(!args.jrePath.empty, 'JRE not found')
        }
        doFirst {
            delete "$destinationDir/jre"
        }
        if (args.jrePath && !args.jrePath.empty) {
            from(tarTree(args.jrePath.singleFile)) {
                includeEmptyDirs = false
                eachFile {
                    replaceRelativePathSegment(it, /jdk.*-jre/, 'jre')
                }
            }
        }
    }
    tasks.register(tarTaskName, Tar) {
        description = "Creates a Linux distribution for ${args.name}."
        with distributions.main.contents
        onlyIf {
            condition(!args.jrePath.empty, 'JRE not found')
        }
        if (args.jrePath && !args.jrePath.empty) {
            from(tarTree(args.jrePath.singleFile)) {
                includeEmptyDirs = false
                eachFile {
                    replaceRelativePathSegment(it, /jdk.*-jre/, 'jre')
                }
            }
        }
        application {
            archiveFileName.set("${applicationName}_${fullVersion}_${args.suffix}.tar.bz2")
        }
        compression = Compression.BZIP2
        archiveExtension = 'tar.bz2'
        group = 'distribution'
    }
    assemble.dependsOn tarTaskName
    parentTask.dependsOn tarTaskName
}



// generate DEB package
tasks.register("linuxDistDeb", Exec) {
    dependsOn tasks.named('jpackage')
    dependsOn tasks.named('jpackageAppContent')
    group = 'distribution'
    def debVersion = '3'
    def debArch = 'amd64'
    if (System.getProperty('os.arch').toLowerCase().contains('aarch64')) {
        debArch = 'arm64'
    }
    inputs.files file(layout.buildDirectory.file("jpackage/app-image/${application.applicationName}"))
    outputs.files file(layout.buildDirectory
            .file("distributions/${application.applicationName}_${version}-${debVersion}_${debArch}.deb"))
    onlyIf { exePresent('dpkg-deb') }

    commandLine(file(Paths.get(System.getProperty('java.home')).resolve("bin/jpackage")),
            '--type', 'deb',
            '--app-version', version,
            '--description', project.property('org.omegat.distDescription'),
            '--icon', file(layout.projectDirectory.file("images/OmegaT.png")),
            '--name', project.property('org.omegat.appName'),
            '--app-image', file(layout.buildDirectory.file("jpackage/app-image/${application.applicationName}")),
            '--dest', file(layout.buildDirectory.file('distributions')),
            '--vendor', project.property('org.omegat.vendor'),
            '--resource-dir', file("release/jpackage-specific/"),
            '--about-url', project.property('org.omegat.url'),
            '--license-file', file(layout.projectDirectory.file("LICENSE")),
            '--install-dir', '/opt/omegat-org',
            '--linux-app-category', 'editors',
            '--linux-app-release', debVersion,
            '--linux-deb-maintainer', project.property('org.omegat.developer.email'),
            '--linux-menu-group', 'Office',
            '--linux-package-name', 'omegat',
            '--linux-shortcut')
}

// generate RPM package
tasks.register("linuxDistRpm", Exec) {
    dependsOn tasks.named('jpackage')
    dependsOn tasks.named('jpackageAppContent')
    group = 'distribution'
    def rpmVersion = '3'
    def rpmArch = 'x86_64'
    if (System.getProperty('os.arch').toLowerCase().contains('aarch64')) {
        rpmArch = 'aarch64'
    }
    inputs.files file(layout.buildDirectory.file("jpackage/app-image/${application.applicationName}"))
    outputs.files file(layout.buildDirectory
            .file("distributions/${application.applicationName}-${version}-${rpmVersion}.${rpmArch}.rpm"))
    onlyIf { exePresent('rpm') }

    commandLine(file(Paths.get(System.getProperty('java.home')).resolve("bin/jpackage")),
            '--type', 'rpm',
            '--app-version', version,
            '--description', project.property('org.omegat.distDescription'),
