steps:
  - ps: |
      if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
        choco install 7zip -y
        Write-Host "##vso[task.prependpath]C:\Program Files\7-Zip"
      } else {
        Write-Host "7-Zip found: $(Get-Command 7z | Select-Object -ExpandProperty Source)"
      }
    displayName: 'Ensure 7-Zip installed (Windows)'
    condition: eq(variables['Agent.OS'], 'Windows_NT')

  - bash: |
      if ! command -v tar &> /dev/null; then
        sudo apt-get install -y tar
      else
        echo "tar found: $(which tar)"
      fi
    displayName: 'Ensure GNU tar installed (Linux)'
    condition: eq(variables['Agent.OS'], 'Linux')

  - bash: |
      if ! command -v tar &> /dev/null; then
        echo "tar not found, but BSD tar should be pre-installed on macOS"
        exit 1
      else
        echo "tar found: $(which tar)"
      fi
    displayName: 'Ensure BSD tar installed (macOS)'
    condition: eq(variables['Agent.OS'], 'Darwin')