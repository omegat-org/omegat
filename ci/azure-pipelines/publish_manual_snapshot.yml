parameters:
  omegatVersion: ''

steps:
  - task: DownloadSecureFile@1
    name: sshKey
    displayName: "Download SSH private key"
    inputs:
      secureFile: omegat-ci-rsa
  - task: Bash@3
    displayName: Configure SSH to disable host key checking and store private key
    inputs:
      targetType: 'inline'
      script: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "$SF_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        cp $(sshKey.secureFilePath) ~/.ssh/id_rsa
        chmod 600 ~/.ssh/known_hosts ~/.ssh/id_rsa
    env:
      SF_HOST: frs.sourceforge.net
  - task: Bash@3
    displayName: 📂 SCP upload to sourceforge file management
    inputs:
      targetType: 'inline'
      script: |
        sudo apt-get update
        sudo apt-get install -q -y lftp
        echo "Push manuals to sourceforge project web"
        srcdir=$(Pipeline.Workspace)/build/docs/manual/
        dest=sftp://$(SOURCEFORGE_CI_USER)@$(SF_HOST)
        destdir=/home/project-web/omegat/htdocs/manual/${OMEGAT_VERSION}-snapshot/
        target=/home/project-web/omegat/htdocs/manual-snapshot
        cmd="set net:max-retries 10; mkdir -p $destdir ; lcd $srcdir ; cd $destdir ; mirror -Re --parallel=4 --verbose=3 ; rm $target ; ln -s $destdir $target ; bye"
        ssh-keygen -p -P "$(SOURCEFORGE_CI_PASSPHRASE)" -N "" -f ~/.ssh/id_rsa
        lftp -e "$cmd" $dest
    env:
      OMEGAT_VERSION: ${{ parameters.omegatVersion }}
      SF_HOST: frs.sourceforge.net
