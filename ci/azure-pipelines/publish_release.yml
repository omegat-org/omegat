parameters:
  - name: omegatVersion
    default: ''

steps:
  - task: DownloadSecureFile@1
    displayName: "Download SSH private key"
    inputs:
      secureFile: omegat-ci-rsa
  - task: Bash@3
    displayName: Configure SSH to scan host key and store private key
    inputs:
      targetType: 'inline'
      script: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "$SF_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        cp $(Agent.TempDirectory)/omegat-ci-rsa ~/.ssh/id_rsa
        chmod 600 ~/.ssh/known_hosts ~/.ssh/id_rsa
  - task: Bash@3
    displayName: 📂upload to sourceforge file management via SCP/SFTP
    inputs:
      targetType: 'inline'
      script: |
        sudo apt-get update
        sudo apt-get install -y lftp
        echo "Push OmegaT files to SourceForge file manager"
        srcdir=$(Pipeline.Workspace)/build/distributions/
        ls -l $srcdir/*
        dest=$(SOURCEFORGE_CI_USER)@frs.sourceforge.net
        destdir="/home/frs/project/omegat/OmegaT\\ -\\ Latest/OmegaT\\ ${OMEGAT_VERSION}/"
        cmd="set net:max-retries 5; mkdir -p '$destdir'; lcd $srcdir; cd '$destdir'; mirror -R -v; bye"
        lftp --env-password -e \"$cmd\" $dest"
    env:
      OMEGAT_VERSION: ${{ parameters.omegatVersion }}
      LFTP_PASSWORD: $(SOURCEFORGE_KEY_PASS)