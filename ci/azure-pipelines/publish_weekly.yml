parameters:
  - name: omegatVersion
    default: ''

steps:
  - task: DownloadSecureFile@1
    name: sshKey
    displayName: "Download SSH private key"
    inputs:
      secureFile: omegat-ci-rsa
  - task: Bash@3
    displayName: Configure SSH to scan host key and store private key
    inputs:
      targetType: 'inline'
      script: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "$SF_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        cp "$(sshKey.secureFilePath)" ~/.ssh/id_rsa
        chmod 600 ~/.ssh/known_hosts ~/.ssh/id_rsa
    env:
      SF_HOST: frs.sourceforge.net
  - task: Bash@3
    displayName: 📂upload to sourceforge file management via SFTP
    inputs:
      targetType: 'inline'
      script: |
        sudo apt-get update
        sudo apt-get install -y lftp
        echo "Push OmegaT files to SourceForge file manager"
        srcdir=$(Pipeline.Workspace)/build/distributions/
        ls -l $srcdir/*
        dest=sftp://$(SOURCEFORGE_CI_USER)@frs.sourceforge.net
        destdir=/home/frs/project/omegat/Weekly
        lftp --env-password -e "
          set net:max-retries 10
          set net:reconnect-interval-base 10
          set net:reconnect-interval-multiplier 2
          set net:timeout 30
          set net:connection-limit 2
          set xfer:log yes
          set sftp:auto-confirm yes
          mkdir -p '$destdir'
          lcd $srcdir
          cd '$destdir'
          mirror -R --verbose=3 --only-newer --parallel=2
          bye
        " $dest
    env:
      OMEGAT_VERSION: ${{ parameters.omegatVersion }}
      LFTP_PASSWORD: $(SOURCEFORGE_KEY_PASS)
