parameters:
  - name: omegatVersion
    default: ''

steps:
  - task: DownloadSecureFile@1
    name: sshKey
    displayName: "Download SSH private key"
    inputs:
      secureFile: omegat-ci-rsa
  - task: Bash@3
    displayName: Configure SSH to disable host key checking and store private key
    inputs:
      targetType: 'inline'
      script: |
        set -euo pipefail
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H "$SF_HOST" >> ~/.ssh/known_hosts 2>/dev/null
        cp "$(sshKey.secureFilePath)" ~/.ssh/id_rsa
        chmod 600 ~/.ssh/known_hosts ~/.ssh/id_rsa
        eval "$(ssh-agent -s)"
        sshpass -P "passphrase" -p "$SSH_KEY_PASS" ssh-add ~/.ssh/id_rsa 
        ssh-add -l
    env:
      SF_HOST: frs.sourceforge.net
      SSH_KEY_PASS: $(SOURCEFORGE_KEY_PASS)
  - task: Bash@3
    displayName: 📂upload to sourceforge file management via SFTP
    inputs:
      targetType: 'inline'
      script: |
        sudo apt-get update
        sudo apt-get install -y lftp sshpass
        echo "Push OmegaT files to SourceForge file manager"
        srcdir=$(Pipeline.Workspace)/build/distributions/
        ls -l $srcdir/*
        dest=sftp://$(SOURCEFORGE_CI_USER)@frs.sourceforge.net
        destdir=/home/frs/project/omegat/Weekly
        cmd="set sftp:auto-confirm yes; set net:max-retries 5; set net:reconnect-interval-base 10; set net:reconnect-interval-multiplier 2; mkdir -p '$destdir'; lcd $srcdir; cd '$destdir'; mirror -R -v --parallel=1; bye"
        lftp -e "$cmd" "$dest"
    env:
      OMEGAT_VERSION: ${{ parameters.omegatVersion }}