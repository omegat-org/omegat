steps:
  - task: Cache@2
    displayName: 'Cache Gradle'
    inputs:
      key: 'gradle | "$(Agent.OS)" | **/build.gradle'
      restoreKeys: |
        gradle | "$(Agent.OS)"
        gradle
      path: '$(GRADLE_USER_HOME)'
  - task: Gradle@3
    inputs:
      tasks: 'test'
      options: '--build-cache -PenvIsCi -PtestMaxHeapSize=2048M'
      jdkVersionOption: '1.17'
