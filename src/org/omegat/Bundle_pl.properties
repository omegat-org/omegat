SW_VIEWER_TEXT=Zakres wyszukiwa\u0144:\nWyszukiwania dotycz\u0105 projektu i domy\u015Blnie obejmuj\u0105 jego tekst \u017Ar\u00F3d\u0142owy i docelowy, referencyjne pami\u0119ci t\u0142umaczeniowe, glosariusze, notatki i komentarze. Zaznacz lub odznacz odpowiednie pola, aby zmieni\u0107 te ustawienia.\nWyszukiwanie mo\u017Cna r\u00F3wnie\u017C przeprowadzi\u0107 w okre\u015Blonej strukturze folder\u00F3w.\n\nTypy:\nWyszukiwania dok\u0142adne odpowiadaj\u0105 ca\u0142emu ci\u0105gowi wyszukiwania.\nWyszukiwanie s\u0142\u00F3w kluczowych odpowiada wszystkim s\u0142owom kluczowym oddzielonym spacjami w dowolnej kolejno\u015Bci.\nWyszukiwania wyra\u017Ce\u0144 regularnych odpowiadaj\u0105 wyra\u017Ceniom regularnym w j\u0119zyku Java, okre\u015Blonych w podr\u0119czniku u\u017Cytkownika.\n\nSymbole wieloznaczne:\nZar\u00F3wno wyszukiwanie dok\u0142adne, jak i wyszukiwanie s\u0142\u00F3w kluczowych obs\u0142uguj\u0105 * i ?. symbole wieloznaczne.\nZnakowi \u201E*" odpowiada zero lub wi\u0119cej znak\u00F3w (na przyk\u0142ad, szukany tekst \u201Etak*" b\u0119dzie odpowiada\u0142 \u201Etak", \u201Etaki" i \u201Etak\u017Ce").\nZnakowi \u201E?" odpowiada dok\u0142adnie jeden znak (na przyk\u0142ad, \u201Etak?" b\u0119dzie odpowiada\u0107 \u201Etaki" i \u201Etaka", ale nie \u201Etak" czy \u201Etak\u017Ce").\n\nZamiana tekstu:\nZamiana tekstu dotyczy segment\u00F3w docelowych projektu.\nNie ma mo\u017Cliwo\u015Bci wyszukiwania s\u0142\u00F3w kluczowych w ci\u0105gu wyszukiwania.\nPodczas u\u017Cywania wyra\u017Ce\u0144 regularnych, ci\u0105g zast\u0119pczy obs\u0142uguje odwo\u0142ania do grup okre\u015Blonych w ci\u0105gu wyszukiwania. U\u017Cyj \u201E$n" w celu odwo\u0142ania si\u0119 do n-tej grupy.

