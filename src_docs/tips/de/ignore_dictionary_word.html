<h3 class="title">Wörter im Wörterbuch ignorieren</h3>
<p>Wenn Sie bestimmte Wörter von der Suche ausschließen möchten, fügen Sie eine UTF-8-kodierte Datei mit dem Namen <code class="filename">ignore.txt</code> in den Ordner ein. Die Datei muss ein Wort pro Zeile enthalten. OmegaT wird alle Wörter in dieser Liste ignorieren.</p>
