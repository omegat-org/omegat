<h3 class="title">Ein Teamprojekt-Repository vorbereiten</h3>
<p>Set up a VCS repository (with e.g., Git) for your project. Kopieren Sie eine <code class="filename">omegat.project</code>-Datei in das Stammverzeichnis und committen Sie die Standardordner.</p>
<p>Teammitglieder können dann das Repository klonen und es direkt in OmegaT öffnen.</p>
