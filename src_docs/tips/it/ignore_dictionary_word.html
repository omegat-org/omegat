<h3 class="title">Ignorare una parola nel dizionario</h3>
<p>Nel caso volessi rimuovere parole da potenziali corrispondenze del dizionario, aggiungi nella cartella un file <code class="filename">ignore.txt</code> codificato in UTF-8. Il file deve contenere una parola per riga. OmegaT ignorerà tutte le parole contenute in quell'elenco.</p>
