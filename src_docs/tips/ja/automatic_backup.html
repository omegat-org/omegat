<h3 class="title">自動バックアップ</h3>
<p>OmegaTは、問題が発生した場合にプロジェクト設定を取得できるように、プロジェクト設定のバックアップを作成します。</p>
<p>OmegaTは、プロジェクトのomegatフォルダーにある<code class="filename">project_save.tmx</code>ファイルに、すべての進行状況を定期的かつ自動的に保存します。OmegaTは、そのファイルの定期的なバックアップも作成します。</p>
