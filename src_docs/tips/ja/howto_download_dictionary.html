<h3 class="title">辞書</h3>
<p>OmegaTは、StarDict 形式および Lingvo DSL 形式の辞書に対応しています。<a class="ulink" href="https://sourceforge.net/p/omegat/wiki/Reference%20Material/" target="_blank">OmegaTウィキ</a>で公開されている辞書を探すこともできます。</p>
<p>辞書をインストールするには:</p>
<div class="orderedlist">
<ol class="orderedlist" type="1">
<li class="listitem"> <p>ファイルをダウンロードします。これは TARアーカイブ (拡張子 <code class="filename">tar.bz</code> または <code class="filename">tar.bz2</code>) をダウンロードする必要があります。</p> </li>
<li class="listitem"> <p>その中身をこのフォルダーに展開します展開すると、拡張子が <code class="filename">dz</code>, <code class="filename">idx</code>, <code class="filename">ifo</code>の３つのファイルができるはずです。</p>
</li>
</ol>
</div>
