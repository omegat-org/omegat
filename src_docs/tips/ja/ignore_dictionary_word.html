<h3 class="title">辞書引きの単語を無視する</h3>
<p>辞書で検索したくない単語を指定する場合は、UTF-8でエンコードされた<code class="filename">ignore.txt</code>ファイルをフォルダーに追加します。ファイルには1行に1語が必要です。OmegaTはそのリストに含まれるすべての単語を無視します。</p>
