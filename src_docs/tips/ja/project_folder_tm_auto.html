<h3 class="title">tm/auto フォルダー</h3>
<p> <span class="term" >tm/auto</span> フォルダーは、完全に一致するセグメントとまだ翻訳されていないセグメントを自動的に入力できる信頼性の高い参照ファイル用です。</p>
<p>このフォルダーに配置されたTMXファイルからの翻訳は、自動の接頭辞なしで一致する分節に自動的に挿入されるため、これらの分節を確認する必要はありません。</p>
