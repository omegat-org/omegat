<h3 class="title">プロジェクトフォルダー</h3>
<p>OmegaTプロジェクトは、一連のフォルダーからなり、翻訳に使用する資材からなるファイルが格納されます。デフォルトの場所は以下の通りです。</p>
<div class="itemizedlist">
    <ul class="itemizedlist" style="list-style-type: disc; ">
        <li class="listitem"> source 原文ファイルが格納される </li>
        <li class="listitem"> target  訳文ファイルが作成され、格納される </li>
        <li class="listitem"> glossary 用語集が格納される </li>
        <li class="listitem"> glossary.txt プロジェクトの書き込み可能な用語集です </li>
        <li class="listitem"> tm 参照翻訳メモリがはいる </li>
        <li class="listitem"> dictionary 参考にする辞書がはいる </li>
    </ul>
</div>
</body>
</html>
