<h3 class="title">プロジェクトが開かないとき</h3>
<p>同じ設定で新しいプロジェクトを作成し、古いプロジェクトから原文、用語集、参照TMファイルをコピーしてください。</p>
<p>最良のバックアップ翻訳メモリ(<code class="filename">project_save.tmx</code>またはバックアップファイル)を新しいプロジェクトのomegatフォルダにコピーまたは名前変更し、新しいプロジェクトを開きます。</p>
