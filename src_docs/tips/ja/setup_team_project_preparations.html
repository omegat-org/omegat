<h3 class="title">チームプロジェクトのリポジトリを準備する</h3>
<p>プロジェクト用にVCSリポジトリ(例:Git)をセットアップしましょう。rootに<code class="filename">omegat.project</code>ファイルを含め、標準フォルダをコミットします。</p>
<p>チームメイトはリポジトリをクローンし、OmegaTで直接開くことができます。</p>
