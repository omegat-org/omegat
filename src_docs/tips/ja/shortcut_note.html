<head>

    <title>メモ帳アクセスショートカット</title>
</head> <body>
<h3 class="title">メモ帳アクセスショートカット</h3>
    <div class="itemizedlist">
        <ul class="itemizedlist" style="list-style-type: disc; ">
            <li class="listitem">
                <p>問題のある分節の<span class="guilabel">メモ帳</span>ウィンドウに備忘録を追加する</p>
                <p> <span class="guimenu">ジャンプ</span> <span class="guimenuitem">メモ帳</span> <span class="keycap"> C</span> <span class="keycap">A</span> +<span class="keycap">9</span> を使用するとメモ帳に移動でき、そこで自分のコメントを追加できます。</p>
                <p> <span class="guimenu">ジャンプ</span> <span class="guimenuitem">編集</span> <span class="keycap">C</span>+<span class="keycap">&gt;A</span>+<span class="keycap">0</span>を使用して編集ウィンドウに戻り、翻訳を再開します。</p>
            </li>
            <li class="listitem">
                <p> <span class="guimenu">編集</span> <span class="guimenuitem">検索...</span> <span class="keycap"> C </span>+<span class="keycap">F</span> を使用して、自分で設定した基準で分節をフィルター検索し、問題のある分節のみを確認できます。</p>
            </li>
        </ul>
    </div>
</body>
</html>
