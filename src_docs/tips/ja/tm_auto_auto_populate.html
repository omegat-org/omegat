<h3 class="title">tm/autoを使って、正確な参考訳文を自動で埋め込む</h3>
<p>信頼できるTMXファイルを<code class="filename">tm/auto</code>フォルダに入れて、自動プレフィックスなしで正確な未翻訳セグメントを自動的に埋めます。</p>
<p>必要な微修正をして翻訳を<code class="filename">project_save.tmx</code>に追加できます。</p>
