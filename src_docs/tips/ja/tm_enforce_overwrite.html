<h3 class="title">翻訳を上書きするにはtm/enforceを使ってください</h3>
<p><code class="filiename">tm/enforce</code>フォルダに信頼できるTMXを配置し、既存の翻訳を自動的に上書きします。プロジェクトメモリよりも信頼性が高い翻訳メモリーを強制することができます。</p>
<p>分節を不変に保つ必要がなければ、更新後にTMXを削除してください。</p>
